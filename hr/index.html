<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal | Sakthi Consultancy</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header class="header">
        <div class="logo">
            <div class="logo-mark">
                <span class="mark-blue"></span>
                <span class="mark-green"></span>
            </div>
            <div class="logo-text">SAKTHI HR</div>
        </div>
        <div class="user-controls" id="user-controls" style="display: none;">
            <div class="user-info">
                <i class="fa-solid fa-circle-user icon-user"></i>
                <span id="header-user-name">Employee Name</span>
                <span class="role-badge" id="header-user-role">Role</span>
            </div>
            <button id="logout-btn" class="btn btn-outline-danger">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <main class="main-content">
        <!-- 1. LOGIN VIEW -->
        <section id="login-view" class="view section-active">
            <div class="glass-card login-card">
                <div class="card-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access the HR portal</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" required placeholder="name@sakthiconsultancy.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" required placeholder="••••••••">
                        </div>
                    </div>
                    <div id="login-error" class="error-message"></div>
                    <button type="submit" class="btn btn-primary w-100">
                        Sign In <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- 2. EMPLOYEE VIEW -->
        <section id="employee-view" class="view">
            <div class="glass-card dashboard-card">
                <div class="dashboard-header">
                    <h2>Daily Work Status</h2>
                    <p class="current-date" id="current-date">Today: ...</p>
                </div>
                
                <div id="status-submitted-alert" class="alert alert-success" style="display: none;">
                    <i class="fa-solid fa-circle-check"></i>
                    <div>
                        <strong>Status Submitted!</strong>
                        <p>Your work status for today has been recorded.</p>
                    </div>
                </div>

                <form id="status-form">
                    <div class="form-group">
                        <label for="work-status">Current Status</label>
                        <select id="work-status" required class="form-control">
                            <option value="">Select your status...</option>
                            <option value="Working Online">Working Online</option>
                            <option value="Working On-site">Working On-site</option>
                            <option value="On Leave">On Leave</option>
                            <option value="Half Day">Half Day</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="work-notes">Work Notes / Tasks Completed</label>
                        <textarea id="work-notes" rows="4" class="form-control" placeholder="Briefly describe what you worked on today..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submit-status-btn">
                        Submit Status <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </section>

        <!-- 3. ADMIN VIEW -->
        <section id="admin-view" class="view">
            <div class="glass-card admin-card">
                <div class="dashboard-header admin-header">
                    <div>
                        <h2>Admin Dashboard</h2>
                        <p>Employee Daily Attendance & Status Records</p>
                    </div>
                    <div class="admin-actions">
                        <div class="date-picker-wrapper">
                            <label for="report-date">Date:</label>
                            <input type="date" id="report-date" class="form-control">
                        </div>
                        <button class="btn btn-primary" id="export-btn">
                            <i class="fa-solid fa-download"></i> Export CSV
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Status</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody id="reports-tbody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div class="bg-abstract shape-1"></div>
    <div class="bg-abstract shape-2"></div>
    <div class="bg-abstract shape-3"></div>

    <script src="script.js"></script>
</body>
</html>
